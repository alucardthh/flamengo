<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquivo 06</title>
<style>
    body {
        margin: 0;
        background-color: #000;
        color: #8b0000;
        font-family: 'Georgia', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        text-align: center;
        overflow: hidden;
    }.lua {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff1a1a, #330000 70%);
    box-shadow: 0 0 60px #8b0000;
    margin-bottom: 40px;
    animation: pulsar 4s infinite;
}

@keyframes pulsar {
    0% { box-shadow: 0 0 30px #8b0000; }
    50% { box-shadow: 0 0 90px #ff0000; }
    100% { box-shadow: 0 0 30px #8b0000; }
}

h1 {
    font-weight: normal;
    letter-spacing: 4px;
    margin-bottom: 20px;
    animation: tremor 3s infinite;
}

@keyframes tremor {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(1px); }
    50% { transform: translateX(-1px); }
    75% { transform: translateX(1px); }
}

.letras {
    font-size: 32px;
    letter-spacing: 25px;
    cursor: pointer;
    transition: 0.3s;
}

.letras:hover {
    color: #ff0000;
    text-shadow: 0 0 15px red;
}

.dica {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    opacity: 0.15;
    letter-spacing: 2px;
}

#coroa {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: fadeIn 3s forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

#coroa img {
    max-width: 450px;
    opacity: 0.9;
    filter: drop-shadow(0 0 25px darkred);
    animation: glitch 2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -2px); }
    60% { transform: translate(-1px, 1px); }
    80% { transform: translate(1px, -1px); }
    100% { transform: translate(0); }
}

#coroa h2 {
    margin-top: 30px;
    letter-spacing: 4px;
    color: #550000;
    font-weight: normal;
}

</style>
</head>
<body><div class="lua"></div><h1>O Cordeiro abriu o primeiro selo.</h1><div class="letras" onclick="verificarOrdem()">
    R O C O A
</div><div class="dica">
    o primeiro será o último
</div><div id="coroa">
    <img src="coroa.jpg" alt="Coroa de Espinhos">
    <h2>O JULGAMENTO JÁ COMEÇOU</h2>
</div><audio id="som" autoplay loop>
    <source src="sussurro.mp3" type="audio/mpeg">
</audio><script>
function verificarOrdem() {
    let resposta = prompt("Reorganize as letras.");
    if(resposta && resposta.toUpperCase() === "COROA"){
        document.getElementById("coroa").style.display = "flex";
    } else {
        document.body.style.backgroundColor = "#0a0000";
        alert("Ele está olhando.");
    }
}
</script></body>
  </html>
